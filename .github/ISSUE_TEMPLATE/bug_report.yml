name: Bug Report
description: Report a bug in Plugin Gentleman
labels: ["type:bug", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        # 🐛 Bug Report

        Thanks for helping improve Plugin Gentleman. Please include enough detail for maintainers to reproduce the problem quickly.

        > **How this works:**
        > 1. You submit this issue → it gets `status:needs-review` automatically.
        > 2. A maintainer reviews it → adds `status:approved` if accepted.
        > 3. Only then should a PR be opened to fix it.

  - type: checkboxes
    id: preflight
    attributes:
      label: "📋 Pre-flight Checks"
      description: Please confirm before submitting.
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs `status:approved` before a PR should be opened
          required: true

  - type: textarea
    id: description
    attributes:
      label: "📝 Bug Description"
      description: What happened? Be specific.
      placeholder: |
        Example: Mustachi stops rendering in the sidebar after...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔄 Steps to Reproduce"
      description: Minimal steps that reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected Behavior"
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ Actual Behavior"
      description: What actually happened? Include errors, screenshots, or terminal output when useful.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🖥️ Environment

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Gentleman Version
      description: The package version you installed or tested.
      placeholder: "e.g. 1.3.2"
    validations:
      required: true

  - type: input
    id: opencode-version
    attributes:
      label: OpenCode Version
      description: Include the OpenCode version if available.
      placeholder: "e.g. 1.3.13"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch/Manjaro)
        - Linux (Fedora/RHEL)
        - Linux (Other)
        - Windows
        - Windows (WSL)
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - opencode plugin plugin-gentleman --global
        - opencode plugin plugin-gentleman@latest --global --force
        - npm link
        - npm pack tarball
        - Manual opencode.json plugin entry
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "📦 Affected Area"
      options:
        - Home logo / theme
        - Sidebar Mustachi rendering
        - Animations / busy state
        - Personality phrases
        - OS/provider detection
        - Metrics display
        - Configuration parsing
        - Packaging / npm install
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: "⚙️ Relevant OpenCode Plugin Config"
      description: Paste only the plugin-related config. Remove secrets and unrelated settings.
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "📋 Logs / Error Output"
      description: Paste relevant terminal output. This will be formatted as shell.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "💡 Additional Context"
      description: Screenshots, terminal notes, workarounds, or anything else that helps.
    validations:
      required: false
